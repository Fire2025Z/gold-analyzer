[build]
  command = """
    git clone https://github.com/flutter/flutter.git --depth 1 --branch stable &&
    export PATH="$PATH:$(pwd)/flutter/bin" &&
    flutter --version &&
    flutter pub get &&
    flutter build web --release
  """
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200